<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema DP - Departamento Pessoal</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/dp-logo/192/192" />
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #64748b;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 3px solid #f1f5f9; border-top-color: #08294a; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
          <p>Carregando Sistema DP...</p>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="text/javascript">
      window.onerror = function(msg, url, line, col, error) {
        console.error("Global Error: ", msg, " at ", url, ":", line);
        var root = document.getElementById('root');
        if (root) {
          // Overwrite the loading UI with the error message
          root.innerHTML = '<div style="padding: 40px; color: #08294a; font-family: sans-serif; text-align: center;">' +
            '<h2 style="font-size: 24px; margin-bottom: 16px;">Erro de Inicialização</h2>' +
            '<p style="color: #64748b; margin-bottom: 24px;">Ocorreu um erro ao carregar a aplicação. Isso pode ser devido a variáveis de ambiente ausentes ou um erro no código.</p>' +
            '<div style="background: #f1f5f9; padding: 16px; border-radius: 12px; margin-bottom: 24px; text-align: left; font-family: monospace; font-size: 12px; overflow: auto;">' +
            '<strong>Erro:</strong> ' + msg + '<br>' +
            '<strong>Local:</strong> ' + url + ':' + line +
            '</div>' +
            '<button onclick="location.reload()" style="padding: 12px 24px; background: #08294a; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">Recarregar Página</button>' +
            '</div>';
        }
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
